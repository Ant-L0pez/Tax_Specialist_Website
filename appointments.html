<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Schedule Appointment</title>

<link rel="stylesheet" href="styles.css">

</head>

<body>

<header>

<nav>

<div class="logo">
Fidelity Income Tax
</div>

<a href="index.html">Home</a>

</nav>

</header>

<section class="appointment">

<h2>Schedule an Appointment</h2>

<p>Select an available time slot below.</p>

<iframe
src="https://calendar.google.com/calendar/appointments/schedules/YOUR_LINK"
width="100%"
height="600"
style="border:0">
</iframe>

<h2>Upload Required Documents</h2>

<form action="https://formsubmit.co/fidelity2024@yahoo.com"
method="POST"
enctype="multipart/form-data">

<input type="text" name="name" placeholder="Name" required>

<input type="email" name="email" placeholder="Email" required>

<label>Upload W-2 / 1099 / ID / Prior Returns</label>

<input type="file" name="documents">

<button type="submit">Submit Documents</button>

</form>

</section>

</body>

</html>
